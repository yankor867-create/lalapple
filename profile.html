<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>প্রোফাইল - লাল আপেল</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-container">
        <header class="app-header" style="text-align:center;">
            <div class="w-20 h-20 rounded-full bg-red-500/20 flex items-center justify-center mx-auto"><i class="fas fa-user text-4xl text-white"></i></div>
            <h2 class="text-xl font-bold mt-2" id="profileName">ইউজার</h2>
            <p class="text-sm text-white/70" id="userId">আইডি: --</p>
        </header>

        <div class="stats-grid" style="margin:16px 0;">
            <div class="stat-item"><i class="fas fa-wallet" style="color:var(--gold);"></i><div class="value" id="totalIncome">0</div><div class="label">মোট আয়</div></div>
            <div class="stat-item"><i class="fas fa-eye" style="color:var(--red);"></i><div class="value" id="totalAds">0</div><div class="label">মোট এড</div></div>
            <div class="stat-item"><i class="fas fa-users" style="color:#9C27B0;"></i><div class="value" id="totalReferrals">0</div><div class="label">রেফারেল</div></div>
            <div class="stat-item"><i class="fas fa-calendar" style="color:#FF9800;"></i><div class="value" id="joinDate">-</div><div class="label">জয়েন</div></div>
        </div>

        <div class="glass card" style="margin:16px 0;">
            <h3 style="font-weight:700;">⚙️ সেটিংস</h3>
            <button onclick="copyReferralLink()" class="btn-secondary" style="margin-top:10px; width:100%;"><i class="fas fa-link"></i> রেফারেল লিঙ্ক কপি</button>
            <button onclick="logout()" class="btn-secondary" style="margin-top:6px; width:100%; border-color:var(--red); color:var(--red);">🚪 লগ আউট</button>
        </div>

        <div class="glass card" style="margin:16px 0;">
            <h3 style="font-weight:700;">👥 আপনার লিঙ্ক</h3>
            <div class="ref-link"><code id="profileReferralLink">লোড হচ্ছে...</code></div>
            <button onclick="copyReferralLink()" class="btn-secondary" style="width:100%;">📋 কপি</button>
        </div>

        <a href="index.html" class="back-link">← হোম</a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>হোম</span></a>
        <a href="tasks.html"><i class="fas fa-tasks"></i><span>টাস্ক</span></a>
        <a href="withdraw.html"><i class="fas fa-wallet"></i><span>উইথড্র</span></a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i><span>প্রোফাইল</span></a>
    </nav>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="app.js"></script>
    <script>
        function logout() {
            if (confirm('লগ আউট?')) { localStorage.clear();
                window.location.href = 'index.html'; }
        }
        document.addEventListener('DOMContentLoaded', async () => {
            await loadUser();
            const user = getUserData();
            if (user) {
                document.getElementById('profileName').textContent = user.first_name || 'ইউজার';
                document.getElementById('userId').textContent = `আইডি: ${user.id.substring(0,10)}...`;
                document.getElementById('totalIncome').textContent = (user.total_income || 0).toFixed(2) + ' টাকা';
                document.getElementById('totalAds').textContent = user.total_ads || 0;
                document.getElementById('totalReferrals').textContent = user.total_referrals || 0;
                document.getElementById('joinDate').textContent = new Date(user.join_date).toLocaleDateString('bn');
                const link = `https://t.me/${window.CONFIG.BOT_USERNAME}?startapp=ref${user.id}`;
                document.getElementById('profileReferralLink').textContent = link;
            }
        });
    </script>
</body>
</html>
